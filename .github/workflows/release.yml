name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Check
        run: pnpm run check

      - name: Build
        run: pnpm run build:roam

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/extension.js
          generate_release_notes: true
